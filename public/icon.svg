<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="textGrad" gradientUnits="userSpaceOnUse" x1="40" y1="256" x2="480" y2="256">
      <stop offset="0%" stop-color="#6B1845"/>
      <stop offset="50%" stop-color="#6B35B8"/>
      <stop offset="100%" stop-color="#FF5000"/>
    </linearGradient>
  </defs>
  <!-- White background -->
  <rect width="512" height="512" fill="#FFFFFF"/>
  <!-- "Boo" text with gradient -->
  <text x="40" y="335"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="230"
    font-weight="900"
    fill="url(#textGrad)">Boo</text>
  <!-- Arrow pointing up-right, between B and first o -->
  <g transform="translate(222, 195) rotate(15)">
    <rect x="-8" y="-88" width="16" height="95" rx="6" fill="#FF5000"/>
    <polygon points="0,-116 -20,-86 20,-86" fill="#FF5000"/>
  </g>
</svg>
